<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin dashboard — manage products and orders for Cart to Gate.">
    <title>Manage Dashboard — Cart to Gate</title>

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Textarea fields within dashboard forms */
        .dash-card textarea.form-control,
        .modal-box textarea.form-control {
            min-height: 80px;
            resize: vertical;
        }

        /* Tighten modal textarea */
        .modal-box textarea.form-control {
            min-height: 70px;
        }

        /* Order ID chip style */
        .order-id-chip {
            font-size: 0.8rem;
            background: #f1f3f5;
            padding: 3px 7px;
            border-radius: 5px;
            font-family: monospace;
        }

        /* Customer email sub-line */
        .customer-email {
            font-size: 0.8rem;
            color: #6c757d;
            display: block;
        }

        /* Dashboard section title (not used as h1) */
        .dash-section-title {
            color: #03045E;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        /* ── Dashboard Tab Navigation ── */
        .dash-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: 2px solid #caf0f8;
            padding-bottom: 0;
        }

        .dash-tab {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            margin-bottom: -2px;
            transition: color 0.2s ease, border-color 0.2s ease;
            border-radius: 6px 6px 0 0;
        }

        .dash-tab:hover {
            color: #0077b6;
        }

        .dash-tab.active {
            color: #03045E;
            border-bottom-color: #0077b6;
            background: #f0fbff;
        }

        /* ── Panels ── */
        .dash-panel {
            display: none;
        }

        .dash-panel.active {
            display: block;
        }

        /* ── Add-Product form card ── */
        .dash-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.07);
            padding: 32px 36px;
            margin-bottom: 36px;
        }

        .dash-card h2 {
            font-size: 1.2rem;
            color: #0077b6;
            margin-top: 0;
            margin-bottom: 22px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 10px;
        }

        /* ── Manage Table ── */
        .manage-table-wrap {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.07);
            overflow-x: auto;
        }

        .manage-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.93rem;
        }

        .manage-table th {
            background: #03045E;
            color: #caf0f8;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }

        .manage-table th:first-child {
            border-radius: 14px 0 0 0;
        }

        .manage-table th:last-child {
            border-radius: 0 14px 0 0;
        }

        .manage-table td {
            padding: 13px 16px;
            border-bottom: 1px solid #e9ecef;
            color: #343a40;
            vertical-align: middle;
        }

        .manage-table tr:last-child td {
            border-bottom: none;
        }

        .manage-table tr:hover td {
            background: #f0fbff;
        }

        .manage-table .prod-img {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .manage-table .no-img {
            width: 52px;
            height: 52px;
            background: #e9ecef;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #adb5bd;
        }

        /* ── Action Buttons ── */
        .btn-edit {
            background: #0096c7;
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 7px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-right: 6px;
        }

        .btn-edit:hover {
            background: #0077b6;
        }

        .btn-edit:active {
            transform: scale(0.96);
        }

        .btn-delete {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 7px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-delete:hover {
            background: #b02a37;
        }

        .btn-delete:active {
            transform: scale(0.96);
        }

        /* ── Status badge ── */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-shipped {
            background: #cff4fc;
            color: #0c5460;
        }

        .status-delivered {
            background: #d1e7dd;
            color: #0a3622;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #842029;
        }

        /* ── Product list inside order cell ── */
        .order-products {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .order-products li {
            font-size: 0.85rem;
            color: #495057;
            padding: 2px 0;
        }

        /* ── Edit Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 4, 94, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            transform: translateY(20px);
            transition: transform 0.25s ease;
        }

        .modal-overlay.open .modal-box {
            transform: translateY(0);
        }

        .modal-box h2 {
            margin-top: 0;
            color: #03045E;
            font-size: 1.3rem;
            margin-bottom: 22px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        .modal-actions .auth-btn {
            flex: 1;
            margin-top: 0;
        }

        .btn-cancel {
            flex: 1;
            background: #e9ecef;
            color: #495057;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-cancel:hover {
            background: #dee2e6;
        }

        /* ── Loading / Empty states ── */
        .state-msg {
            text-align: center;
            padding: 48px 20px;
            color: #6c757d;
            font-size: 1rem;
        }

        /* ── Container layout ── */
        .dash-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .dash-page-title {
            color: #03045E;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 32px;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Toast -->
    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- Edit Product Modal -->
    <div id="edit-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
            <h2 id="modal-title">Edit Product</h2>
            <form id="form-edit-product" novalidate>
                <input type="hidden" id="edit-prod-id">
                <div class="form-group">
                    <label for="edit-prod-name">Product Name</label>
                    <input type="text" id="edit-prod-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="edit-prod-desc">Description</label>
                    <textarea id="edit-prod-desc" class="form-control" style="min-height:70px;resize:vertical;"
                        required></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-prod-price">Price (PKR)</label>
                    <input type="number" id="edit-prod-price" class="form-control" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="edit-prod-image">Image URL</label>
                    <input type="url" id="edit-prod-image" class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-prod-stock">Stock</label>
                    <input type="number" id="edit-prod-stock" class="form-control" min="0" required>
                </div>
                <div class="form-error" role="alert" aria-live="polite"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-modal-cancel">Cancel</button>
                    <button type="submit" class="auth-btn" id="btn-modal-save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <header>
        <nav class="navbar">
            <div class="brand">
                <span class="img-logo">
                    <img src="img/delivery-and-courier-motorbike-logo-free-vector.jpg" alt="Cart to Gate logo">
                </span>
                <span class="brand-name">Cart to Gate</span>
            </div>
            <!-- Search bar centered (USER view only) -->
            <div class="nav-search-container" id="nav-search-wrapper" style="display: none;">
                <input type="text" id="nav-search-input" placeholder="Search products by title or description...">
            </div>
            <ul class="nav-links">
                <!-- Dynamically populated by auth.js -->
            </ul>
        </nav>
    </header>

    <main class="dash-container">
        <h1 class="dash-page-title">Admin Dashboard</h1>

        <!-- Tabs -->
        <div class="dash-tabs" role="tablist">
            <button class="dash-tab active" id="tab-add" role="tab" aria-selected="true" aria-controls="panel-add">Add
                Product</button>
            <button class="dash-tab" id="tab-products" role="tab" aria-selected="false"
                aria-controls="panel-products">Manage Products</button>
            <button class="dash-tab" id="tab-orders" role="tab" aria-selected="false"
                aria-controls="panel-orders">Manage Orders</button>
        </div>

        <!-- ── Panel: Add Product ── -->
        <div class="dash-panel active" id="panel-add" role="tabpanel" aria-labelledby="tab-add">
            <div class="dash-card">
                <h2>New Product Details</h2>
                <form id="form-add-product" novalidate>
                    <div class="form-group">
                        <label for="prod-name">Product Name</label>
                        <input type="text" id="prod-name" class="form-control" placeholder="e.g. Wireless Mouse"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="prod-desc">Description</label>
                        <textarea id="prod-desc" class="form-control" placeholder="Describe the product..."
                            style="min-height:80px;resize:vertical;" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="prod-price">Price (PKR)</label>
                        <input type="number" id="prod-price" class="form-control" placeholder="e.g. 2500" min="0"
                            step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="prod-image">Image URL</label>
                        <input type="url" id="prod-image" class="form-control"
                            placeholder="e.g. https://images.unsplash.com/..." required>
                    </div>
                    <div class="form-group">
                        <label for="prod-stock">Stock Quantity</label>
                        <input type="number" id="prod-stock" class="form-control" placeholder="e.g. 50" min="0"
                            required>
                    </div>
                    <div class="form-error" role="alert" aria-live="polite"></div>
                    <button type="submit" class="auth-btn">Add Product</button>
                </form>
            </div>
        </div>

        <!-- ── Panel: Manage Products ── -->
        <div class="dash-panel" id="panel-products" role="tabpanel" aria-labelledby="tab-products">
            <div class="manage-table-wrap">
                <table class="manage-table" id="products-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <tr>
                            <td colspan="5" class="state-msg">Loading products…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ── Panel: Manage Orders ── -->
        <div class="dash-panel" id="panel-orders" role="tabpanel" aria-labelledby="tab-orders">
            <div class="manage-table-wrap">
                <table class="manage-table" id="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Products</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <tr>
                            <td colspan="6" class="state-msg">Loading orders…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 Cart to Gate. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
